<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – Keracare</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --brand-blue: #4589E0;
      --brand-dark: #1e73d8;
      --teal: #0d9e8a;
      --bg: #e9f3ff;
      --glass-bg: rgba(255, 255, 255, 0.9);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      padding: 0;
      margin: 0;
      color: #333;
    }

    /* NAVBAR */
    .navbar-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 60px;
      background: white;
      margin: 20px;
      border-radius: 40px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    
    .logo {
      font-family: 'Playfair Display';
      font-weight: 900;
      font-size: 24px;
      color: var(--brand-dark);
      text-decoration: none;
    }

    .main-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* GLASSMORPHISM CARDS */
    .data-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(69, 137, 224, 0.08);
      margin-bottom: 40px;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .section-title {
      font-family: 'Playfair Display';
      font-weight: 800;
      font-size: 28px;
      color: var(--brand-dark);
      margin: 0;
    }

    /* TABLE STYLING */
    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #edf2f9;
    }

    .table {
      margin-bottom: 0;
      background: white;
    }

    .table thead th {
      background: #f8fbff;
      color: var(--teal);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
      padding: 16px;
      white-space: nowrap;
    }

    .table tbody td {
      padding: 16px;
      vertical-align: middle;
      font-size: 14px;
      color: #555;
      border-bottom: 1px solid #edf2f9;
      white-space: nowrap;
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    .table tbody tr:hover {
      background-color: #f8fbff;
      transition: background-color 0.2s ease;
    }

    .badge-custom {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: #e0f7f4;
      color: var(--teal);
    }

    .link-custom {
      color: var(--brand-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .link-custom:hover {
      text-decoration: underline;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: #888;
      font-style: italic;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar-wrap">
    <a href="index.html" class="logo">Keracare Admin</a>
    <div style="font-size: 14px; font-weight: 600; color: #666;">
      Database Management
    </div>
  <div id="google_translate_element" style="display:inline-block; margin-right: 15px; vertical-align: middle;"></div>
</header>

  <div class="main-container">

    <!-- DOCTORS TABLE -->
    <div class="data-card">
      <div class="section-header">
        <h2 class="section-title">Registered Doctors</h2>
        <span class="badge-custom" id="doctorCount">Loading...</span>
      </div>
      
      <div class="table-container">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Mobile</th>
              <th>Specialization</th>
              <th>Clinic</th>
              <th>City</th>
              <th>Experience</th>
              <th>Files</th>
            </tr>
          </thead>
          <tbody id="doctorsTableBody">
            <tr>
              <td colspan="9" class="loading-state">Fetching doctors...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PATIENTS TABLE -->
    <div class="data-card">
      <div class="section-header">
        <h2 class="section-title">Registered Patients</h2>
        <span class="badge-custom" id="patientCount">Loading...</span>
      </div>
      
      <div class="table-container">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Blood Group</th>
              <th>Assigned Doctor</th>
              <th>City/Address</th>
            </tr>
          </thead>
          <tbody id="patientsTableBody">
            <tr>
              <td colspan="8" class="loading-state">Fetching patients...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Fetch Doctors
    fetch('/api/doctors')
      .then(res => res.json())
      .then(doctors => {
        const tbody = document.getElementById('doctorsTableBody');
        document.getElementById('doctorCount').innerText = `${doctors.length || 0} Doctors`;
        
        if (!doctors || doctors.length === 0) {
          tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4" style="color:#888;">No doctors registered yet.</td></tr>`;
          return;
        }

        tbody.innerHTML = doctors.map(doc => `
          <tr>
            <td style="font-weight:600;">#${doc.id}</td>
            <td><strong>${doc.name || 'N/A'}</strong></td>
            <td>${doc.email || 'N/A'}</td>
            <td>${doc.mobile || 'N/A'}</td>
            <td><span style="background:#e9f3ff; color:var(--brand-dark); padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600;">${doc.specialization || 'N/A'}</span></td>
            <td>${doc.clinic || 'N/A'}</td>
            <td>${doc.city || 'N/A'}</td>
            <td>${doc.experience ? doc.experience + ' Yrs' : 'N/A'}</td>
            <td>
              ${doc.degreePath ? `<a href="/${doc.degreePath.replace(/\\/g, '/')}" target="_blank" class="link-custom me-2"><i class="bi bi-file-earmark-medical"></i> Degree</a>` : ''}
              ${doc.licensePath ? `<a href="/${doc.licensePath.replace(/\\/g, '/')}" target="_blank" class="link-custom me-2"><i class="bi bi-file-earmark-check"></i> License</a>` : ''}
              ${doc.idproofPath ? `<a href="/${doc.idproofPath.replace(/\\/g, '/')}" target="_blank" class="link-custom"><i class="bi bi-person-badge"></i> ID</a>` : ''}
            </td>
          </tr>
        `).join('');
      })
      .catch(err => {
        console.error('Error fetching doctors:', err);
        document.getElementById('doctorsTableBody').innerHTML = `<tr><td colspan="9" class="text-danger text-center">Failed to load doctor data.</td></tr>`;
      });

    // Fetch Patients
    fetch('/api/users')
      .then(res => res.json())
      .then(users => {
        const tbody = document.getElementById('patientsTableBody');
        document.getElementById('patientCount').innerText = `${users.length || 0} Patients`;

        if (!users || users.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4" style="color:#888;">No patients registered yet.</td></tr>`;
          return;
        }

        tbody.innerHTML = users.map(user => `
          <tr>
            <td style="font-weight:600;">#${user.id}</td>
            <td><strong>${user.firstName || ''} ${user.lastName || ''}</strong></td>
            <td>${user.mobile || 'N/A'}</td>
            <td>${user.dob || 'N/A'}</td>
            <td>${user.gender || 'N/A'}</td>
            <td>${user.bloodGroup ? `<span style="background:#ffebee; color:#d32f2f; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600;">${user.bloodGroup}</span>` : '-'}</td>
            <td>${user.doctor || 'Not Assigned'}</td>
            <td>
              <div style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                ${user.address || 'N/A'}
              </div>
            </td>
          </tr>
        `).join('');
      })
      .catch(err => {
        console.error('Error fetching patients:', err);
        document.getElementById('patientsTableBody').innerHTML = `<tr><td colspan="8" class="text-danger text-center">Failed to load patient data.</td></tr>`;
      });
  </script>

<!-- Google Translate Script -->
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
\n</body>
</html>
