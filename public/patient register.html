<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – Keracare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --brand-blue:#4589E0; --brand-dark:#1e73d8; --brand-light:#2bb3ff;
    --teal:#0d9e8a; --teal-light:#e0f7f4; --teal-mid:#14b8a6; --bg:#e9f3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;}

  .navbar-wrap{display:flex;justify-content:space-between;align-items:center;padding:16px 60px;background:white;margin:20px;border-radius:40px;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
  .logo{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;color:var(--brand-dark);letter-spacing:-0.5px;text-decoration:none;}
  .nav-links{display:flex;list-style:none;gap:30px;margin:0;}
  .nav-links li{cursor:pointer;font-size:14px;color:#444;transition:color 0.2s;}
  .nav-links li:hover{color:var(--brand-blue);}
  .portal-btn{background:var(--brand-blue);color:white;border:2px solid var(--brand-blue);padding:9px 22px;border-radius:20px;cursor:pointer;font-weight:600;font-size:14px;font-family:'Poppins',sans-serif;transition:all .25s;}
  .portal-btn:hover{background:white;color:var(--brand-blue);}

  .reg-page{min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .reg-card{width:100%;max-width:600px;background:white;border-radius:32px;box-shadow:0 24px 64px rgba(69,137,224,0.12);padding:52px 48px;}

  .reg-header{text-align:center;margin-bottom:36px;}
  .reg-header .badge-pill{display:inline-block;background:var(--teal-light);color:var(--teal);font-size:11px;font-weight:700;padding:5px 16px;border-radius:30px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
  .reg-header h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:#1a1a2e;margin-bottom:6px;}
  .reg-header p{font-size:13px;color:#888;}

  .field-label{font-size:12px;font-weight:600;color:#444;margin-bottom:8px;display:block;letter-spacing:0.3px;}
  .input-wrap{position:relative;}
  .input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:#aaa;transition:color .2s;pointer-events:none;z-index:2;}
  .form-input{width:100%;padding:13px 16px 13px 46px;border:1.5px solid #e5e7eb;border-radius:14px;font-size:14px;font-family:'Poppins',sans-serif;color:#1a1a2e;background:#f9fafb;transition:all .25s;outline:none;}
  .form-input:focus{border-color:var(--brand-blue);background:white;box-shadow:0 0 0 4px rgba(69,137,224,0.1);}
  .input-wrap:focus-within .input-icon{color:var(--brand-blue);}
  .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;padding:4px;transition:color .2s;z-index:2;}
  .toggle-pw:hover{color:var(--brand-blue);}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--teal-mid));color:white;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 6px 20px rgba(13,158,138,0.35);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
  .btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(13,158,138,0.45);}
  .btn-back{width:100%;padding:13px;background:white;color:#888;border:1.5px solid #e5e7eb;border-radius:14px;font-size:14px;font-weight:500;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .25s;margin-top:10px;}
  .btn-back:hover{border-color:#aaa;color:#444;}

  .progress-bar-wrap{height:4px;background:#e5e7eb;border-radius:4px;margin-bottom:32px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--brand-blue));border-radius:4px;transition:width .4s ease;width:0%;}

  .strength-bar{display:flex;gap:4px;margin-top:8px;}
  .strength-seg{flex:1;height:4px;border-radius:4px;background:#e5e7eb;transition:background .3s;}

  .alert-msg{display:none;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:16px;align-items:center;gap:10px;}
  .alert-msg.error{background:#fff5f5;border:1px solid #fecaca;color:#c0392b;display:flex;}
  .alert-msg.success{background:var(--teal-light);border:1px solid #b2ede7;color:var(--teal);display:flex;}

  .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .footer{background:#0b0b0b;color:white;padding:40px 80px;margin:20px;border-radius:30px;position:relative;overflow:hidden;}
  .footer::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(#222 1px,transparent 1px),linear-gradient(90deg,#222 1px,transparent 1px);background-size:40px 40px;opacity:0.4;}
  .footer-inner{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;flex-wrap:wrap;gap:20px;}
  .footer-logo{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;color:#2bb3ff;}
  .footer-links{display:flex;gap:24px;}
  .footer-links a{color:#ccc;font-size:13px;text-decoration:none;transition:color .2s;}
  .footer-links a:hover{color:#2bb3ff;}
  .footer-bottom{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #333;color:#aaa;font-size:12px;position:relative;z-index:1;}

  @media(max-width:600px){
    .navbar-wrap{padding:14px 20px;margin:10px;}
    .nav-links{display:none;}
    .reg-card{padding:32px 22px;}
    .two-col{grid-template-columns:1fr;}
    .footer{padding:28px 20px;margin:10px;}
  }
</style>
</head>
<body>

<header class="navbar-wrap">
  <a href="index.html" class="logo">Keracare</a>
  <ul class="nav-links">
    <li onclick="location.href='index.html'">Home</li>
    <li onclick="location.href='about.html'">About</li>
    <li onclick="location.href='services.html'">Services</li>
    <li><a href="#contact" style="color:#444;text-decoration:none;font-size:14px;">Contact</a></li>
  </ul>
  <div id="google_translate_element" style="display:inline-block; margin-right: 15px; vertical-align: middle;"></div>
<button class="portal-btn">User Portal</button>
</header>

<div class="reg-page">
  <div class="reg-card">

    <div class="reg-header">
      <div class="badge-pill">&#10022; New Patient</div>
      <h2>Create Your Account</h2>
      <p>Join Keracare — your health history, always with you</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <!-- Alert -->
    <div class="alert-msg" id="alertMsg">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertText"></span>
    </div>

    <form id="registerForm" novalidate>

      <!-- Name Row -->
      <div class="two-col mb-3">
        <div>
          <label class="field-label">First Name</label>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input type="text" id="firstName" class="form-input" placeholder="First name">
          </div>
        </div>
        <div>
          <label class="field-label">Last Name</label>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input type="text" id="lastName" class="form-input" placeholder="Last name">
          </div>
        </div>
      </div>

      <!-- Mobile -->
      <div class="mb-3">
        <label class="field-label">Mobile Number</label>
        <div class="input-wrap">
          <i class="bi bi-phone input-icon"></i>
          <input type="tel" id="mobile" class="form-input" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric">
        </div>
      </div>

      <!-- Date of Birth & Gender -->
      <div class="two-col mb-3">
        <div>
          <label class="field-label">Date of Birth</label>
          <div class="input-wrap">
            <i class="bi bi-calendar3 input-icon"></i>
            <input type="date" id="dob" class="form-input">
          </div>
        </div>
        <div>
          <label class="field-label">Gender</label>
          <div class="input-wrap">
            <i class="bi bi-gender-ambiguous input-icon"></i>
            <select id="gender" class="form-input">
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-1">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="password" class="form-input" placeholder="Create a strong password" style="padding-right:46px;">
          <button type="button" class="toggle-pw" id="togglePw">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div class="strength-bar mt-2">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <p style="font-size:11px;color:#aaa;margin-top:5px;" id="strengthLabel">Enter a password to check strength</p>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3 mt-3">
        <label class="field-label">Confirm Password</label>
        <div class="input-wrap">
          <i class="bi bi-shield-lock input-icon"></i>
          <input type="password" id="confirmPw" class="form-input" placeholder="Re-enter your password" style="padding-right:46px;">
          <button type="button" class="toggle-pw" id="togglePw2">
            <i class="bi bi-eye" id="eyeIcon2"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="submitText">Create Account &amp; Login</span>
        <div class="spinner" id="regSpinner"></div>
        <i class="bi bi-arrow-right" id="submitArrow"></i>
      </button>

      <button type="button" class="btn-back" onclick="location.href='patient login.html'">
        <i class="bi bi-arrow-left"></i> Back to Login
      </button>

    </form>
  </div>
</div>

<footer class="footer" id="contact">
  <div class="footer-inner">
    <div class="footer-logo">Keracare</div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
    </div>
    <div style="color:#ccc;font-size:13px;position:relative;z-index:1;">📞 +91 9000000000</div>
  </div>
  <div class="footer-bottom">© 2026 Keracare Health Services. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* DIGITS ONLY - mobile */
  document.getElementById('mobile').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0,10);
    updateProgress();
  });

  /* TOGGLE PASSWORD */
  document.getElementById('togglePw').addEventListener('click', function() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('eyeIcon');
    const hidden = inp.type === 'password';
    inp.type = hidden ? 'text' : 'password';
    ico.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });
  document.getElementById('togglePw2').addEventListener('click', function() {
    const inp = document.getElementById('confirmPw');
    const ico = document.getElementById('eyeIcon2');
    const hidden = inp.type === 'password';
    inp.type = hidden ? 'text' : 'password';
    ico.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  /* PASSWORD STRENGTH */
  document.getElementById('password').addEventListener('input', function() {
    const pw = this.value;
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    for (let i = 1; i <= 4; i++) {
      document.getElementById('s' + i).style.background = i <= score ? colors[score-1] : '#e5e7eb';
    }
    document.getElementById('strengthLabel').textContent = pw.length ? labels[score-1] + ' password' : 'Enter a password to check strength';
    document.getElementById('strengthLabel').style.color = pw.length ? colors[score-1] : '#aaa';
    updateProgress();
  });

  /* PROGRESS BAR */
  function updateProgress() {
    const fields = ['firstName','lastName','mobile','dob','gender','password','confirmPw'];
    const filled = fields.filter(id => document.getElementById(id).value.trim() !== '').length;
    document.getElementById('progressFill').style.width = Math.round((filled / fields.length) * 100) + '%';
  }
  document.querySelectorAll('.form-input').forEach(el => el.addEventListener('input', updateProgress));

  /* ALERT */
  function showAlert(msg, type) {
    const box  = document.getElementById('alertMsg');
    const text = document.getElementById('alertText');
    const icon = box.querySelector('i');
    box.className = 'alert-msg ' + type;
    icon.className = type === 'error' ? 'bi bi-exclamation-circle-fill' : 'bi bi-check-circle-fill';
    text.textContent = msg;
    box.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  /* REGISTER SUBMIT */
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const mobile    = document.getElementById('mobile').value.trim();
    const dob       = document.getElementById('dob').value;
    const gender    = document.getElementById('gender').value;
    const password  = document.getElementById('password').value;
    const confirmPw = document.getElementById('confirmPw').value;

    if (!firstName || !lastName) return showAlert('Please enter your full name.', 'error');
    if (!mobile || mobile.length !== 10) return showAlert('Enter a valid 10-digit mobile number.', 'error');
    if (!dob) return showAlert('Please enter your date of birth.', 'error');
    if (!gender) return showAlert('Please select your gender.', 'error');
    if (!password || password.length < 6) return showAlert('Password must be at least 6 characters.', 'error');
    if (password !== confirmPw) return showAlert('Passwords do not match. Please try again.', 'error');

    const btn      = document.getElementById('submitBtn');
    const btnTxt   = document.getElementById('submitText');
    const spinner  = document.getElementById('regSpinner');
    const arrow    = document.getElementById('submitArrow');

    btn.disabled = true;
    // Call Backend API
    fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ firstName, lastName, mobile, dob, gender, password })
    })
    .then(response => response.json().then(data => ({ status: response.status, body: data })))
    .then(({ status, body }) => {
      if (status !== 201) {
        btn.disabled = false;
        btnTxt.textContent = 'Create Account & Login';
        spinner.style.display = 'none';
        arrow.style.display   = 'inline';
        return showAlert(body.error || 'Server error occurred.', 'error');
      }

      showAlert('Account created! Redirecting to login…', 'success');
      setTimeout(function() {
        location.href = 'patient login.html';
      }, 1400);
    })
    .catch(err => {
      btn.disabled = false;
      btnTxt.textContent = 'Create Account & Login';
      spinner.style.display = 'none';
      arrow.style.display   = 'inline';
      showAlert('Network error. Please make sure the server is runnig.', 'error');
    });
  });
</script>

function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
}
</script>

\n</body>
</html>
